<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedCase - Medical Simulation</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #2d3748;
            text-align: center;
        }
        .container {
            padding: 2rem;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3182ce;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h1 { font-size: 1.5rem; margin-bottom: 10px; color: #2c5282; }
        p { font-size: 1rem; color: #4a5568; }
        .btn {
            display: none;
            margin-top: 20px;
            padding: 12px 24px;
            background-color: #3182ce;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="loading-ui">
        <h1>Loading MedCase...</h1>
        <div class="loader"></div>
        <p>Redirecting you to the store.</p>
    </div>
    
    <div id="manual-ui" style="display:none;">
        <h1>Download MedCase</h1>
        <p>Please select the store for your device:</p>
        <a id="ios-btn" class="btn" style="display:block; margin-bottom:10px; background-color: #000;">Download on the App Store</a>
        <a id="android-btn" class="btn" style="display:block; background-color: #3DDC84; color: #000;">Get it on Google Play</a>
    </div>
</div>

<script>
    const GOOGLE_PLAY_URL = "https://play.google.com/store/apps/details?id=com.medcase.medcase_app";
    const APP_STORE_URL = "https://apps.apple.com/us/app/medcase-medical-simulation/id6762118692";

    function redirect() {
        const userAgent = navigator.userAgent || navigator.vendor || window.opera;

        // iOS Check
        if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
            window.location.href = APP_STORE_URL;
        } 
        // Android Check
        else if (/android/i.test(userAgent)) {
            window.location.href = GOOGLE_PLAY_URL;
        } 
        // Show buttons for desktop or unknown devices
        else {
            document.getElementById('loading-ui').style.display = 'none';
            document.getElementById('manual-ui').style.display = 'block';
            document.getElementById('ios-btn').href = APP_STORE_URL;
            document.getElementById('android-btn').href = GOOGLE_PLAY_URL;
        }
    }

    // Start redirection when the page loads
    window.onload = redirect;

    // Show buttons if not redirected after 3 seconds (Fail-safe)
    setTimeout(() => {
        document.getElementById('loading-ui').style.display = 'none';
        document.getElementById('manual-ui').style.display = 'block';
        document.getElementById('ios-btn').href = APP_STORE_URL;
        document.getElementById('android-btn').href = GOOGLE_PLAY_URL;
    }, 3000);
</script>

</body>
</html>
